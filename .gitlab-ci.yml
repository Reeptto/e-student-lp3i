stages:
  - build

variables:
  # Optimize docker build
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  # Dynamically tag based on the branch name
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG

build-image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    # Auto-login to GitLab's built-in Container Registry
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Build the image
    - docker build -t $IMAGE_TAG .
    # Push the branch-specific tag
    - docker push $IMAGE_TAG
    # If we are on the main/default branch, also tag and push as 'latest'
    - |
      if [ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]; then
        docker tag $IMAGE_TAG $CI_REGISTRY_IMAGE:latest
        docker push $CI_REGISTRY_IMAGE:latest
      fi
  rules:
    # Only run this job if there is a Dockerfile and it's a commit to a branch
    - if: $CI_COMMIT_BRANCH
      exists:
        - Dockerfile
